<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Consumption Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1E1E1E;
            --bg-medium: #252526;
            --border-color: #333333;
            --text-primary: #FFFFFF;
            --text-secondary: #AAAAAA;
            --accent-blue: #007ACC;
            --accent-green: #00CC6A;
            --accent-red: #FF1744;
            --accent-yellow: #FFD600;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            font-size: 13px;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 1px solid var(--border-color);
        }

        .header {
            background: var(--bg-medium);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            -webkit-app-region: drag;
            app-region: drag;
            border-bottom: 1px solid var(--border-color);
            cursor: default;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-icon {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 3px;
        }

        .app-title {
            font-size: 15px;
            font-weight: 600;
        }

        .app-version {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: no-drag;
            app-region: no-drag;
            border-radius: 3px;
            font-weight: bold;
        }

        .close-btn:hover {
            background: var(--accent-red);
            color: white;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .provider-item {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .provider-item:last-child {
            border-bottom: none;
        }

        .provider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .provider-name {
            font-size: 13px;
            font-weight: 500;
        }

        .provider-type {
            font-size: 11px;
            color: #888;
            background: #3E3E42;
            padding: 2px 6px;
            border-radius: 2px;
        }

        .provider-bar-container {
            background: #3E3E42;
            height: 20px;
            margin-bottom: 4px;
        }

        .provider-bar {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
        }

        .provider-bar.low { background: var(--accent-green); }
        .provider-bar.medium { background: var(--accent-yellow); color: #000; }
        .provider-bar.high { background: var(--accent-red); }
        .provider-bar.status { background: var(--accent-blue); }
        .provider-bar.inactive { background: #555; color: #888; }

        .provider-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .footer {
            background: var(--bg-medium);
            padding: 8px 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }

        .checkbox-label input[type="checkbox"] {
            width: 14px;
            height: 14px;
            accent-color: var(--accent-blue);
            cursor: pointer;
        }

        .footer-right {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            background: #444444;
            border: none;
            color: var(--text-primary);
            width: 32px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            -webkit-app-region: no-drag;
            app-region: no-drag;
        }

        .icon-btn:hover {
            background: #555555;
        }

        .icon-btn.active {
            color: var(--accent-green);
        }

        .error {
            color: var(--accent-red);
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header" data-tauri-drag-region>
            <div class="header-left">
                <div class="app-icon"></div>
                <span class="app-title">AI Consumption Tracker</span>
                <span class="app-version" id="versionText">v1.0</span>
            </div>
            <button class="close-btn" id="closeBtn" title="Close">×</button>
        </div>

        <div class="content" id="providersList">
            <div class="loading">Loading providers...</div>
        </div>

        <div class="footer">
            <label class="checkbox-label">
                <input type="checkbox" id="showAllToggle" checked>
                <span>Show All</span>
            </label>
            <div class="footer-right">
                <label class="checkbox-label" style="margin-right: 8px;">
                    <input type="checkbox" id="alwaysOnTopToggle">
                    <span>Top</span>
                </label>
                <label class="checkbox-label" style="margin-right: 8px;">
                    <input type="checkbox" id="stayOpenToggle">
                    <span>Pin</span>
                </label>
                <button class="icon-btn" id="privacyBtn" title="Privacy Mode">👁</button>
                <button class="icon-btn" id="refreshBtn" title="Refresh">↻</button>
                <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let showAll = true;
        let privacyMode = false;
        let usageData = [];

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            console.log('Tauri object:', typeof window.__TAURI__);
            console.log('Tauri keys:', window.__TAURI__ ? Object.keys(window.__TAURI__) : 'none');
            
            // Setup close button with IPC
            document.getElementById('closeBtn').addEventListener('click', function() {
                console.log('Close clicked');
                
                // Try core.invoke (Tauri 2.0)
                if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
                    console.log('Using core.invoke');
                    window.__TAURI__.core.invoke('close_window')
                        .then(() => console.log('Close invoked via core'))
                        .catch(e => console.error('Close error:', e));
                } else if (window.__TAURI__ && window.__TAURI__.invoke) {
                    console.log('Using invoke');
                    window.__TAURI__.invoke('close_window')
                        .then(() => console.log('Close invoked'))
                        .catch(e => console.error('Close error:', e));
                } else {
                    console.error('No invoke method found');
                }
            });

            // Setup other buttons
            document.getElementById('privacyBtn').addEventListener('click', togglePrivacy);
            document.getElementById('refreshBtn').addEventListener('click', refreshData);
            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            document.getElementById('showAllToggle').addEventListener('change', refreshData);
            document.getElementById('alwaysOnTopToggle').addEventListener('change', toggleAlwaysOnTop);
            
            // Load initial data
            loadData();
        });

        async function loadData() {
            const container = document.getElementById('providersList');
            container.innerHTML = '<div class="loading">Loading...</div>';

            try {
                // First check if agent is running
                let agentRunning = false;
                if (window.__TAURI__ && window.__TAURI__.invoke) {
                    agentRunning = await window.__TAURI__.invoke('is_agent_running');
                    console.log('Agent running:', agentRunning);
                }

                // Get usage from agent or show setup message
                let data = { providers: [] };
                if (agentRunning && window.__TAURI__ && window.__TAURI__.invoke) {
                    data = await window.__TAURI__.invoke('get_usage');
                    console.log('Loaded from agent:', data);
                }

                // If agent not running, show helpful message
                if (!agentRunning || !data) {
                    container.innerHTML = '<div class="empty-state">' +
                        '<div style="font-size: 24px; margin-bottom: 10px;">🤖</div>' +
                        '<div>Agent Not Running</div>' +
                        '<div style="font-size: 11px; color: #666; margin-top: 8px;">Start the agent to see usage data</div>' +
                        '<div style="font-size: 11px; color: #888; margin-top: 16px;">Run: aic-agent start</div>' +
                        '</div>';
                    return;
                }

                usageData = data.providers || [];
                renderProviders();
            } catch (err) {
                console.error('Error:', err);
                container.innerHTML = '<div class="error">Error: ' + escapeHtml(err.message || err) + '</div>';
            }
        }
        
        function formatProviderName(id) {
            const names = {
                'github-copilot': 'GitHub Copilot',
                'openai': 'OpenAI',
                'anthropic': 'Anthropic',
                'deepseek': 'DeepSeek',
                'gemini': 'Google Gemini',
                'kimi': 'Kimi'
            };
            return names[id] || id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        async function refreshData() {
            showAll = document.getElementById('showAllToggle').checked;
            document.getElementById('refreshBtn').style.opacity = '0.5';
            
            try {
                let data = [];
                if (window.__TAURI__ && window.__TAURI__.invoke) {
                    data = await window.__TAURI__.invoke('refresh_usage');
                }
                usageData = data || [];
                renderProviders();
            } catch (err) {
                console.error('Error:', err);
            } finally {
                document.getElementById('refreshBtn').style.opacity = '1';
            }
        }

        function renderProviders() {
            const container = document.getElementById('providersList');
            let filtered = showAll ? usageData : usageData.filter(u => u.is_available);
            filtered.sort((a, b) => a.provider_name.localeCompare(b.provider_name));

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div style="font-size: 24px; margin-bottom: 10px;">📊</div><div>No providers configured</div><div style="font-size: 11px; color: #666; margin-top: 8px;">Use Settings or CLI to add providers</div></div>';
                return;
            }

            container.innerHTML = filtered.map(p => {
                const pct = p.usage_percentage || 0;
                const avail = p.is_available;
                let cls = 'low';
                if (!avail) cls = 'inactive';
                else if (pct >= 80) cls = 'high';
                else if (pct >= 60) cls = 'medium';

                const costInfo = (p.cost_used !== undefined && p.cost_used > 0)
                    ? `$${p.cost_used.toFixed(2)}`
                    : '';

                let desc = p.description || '';
                if (privacyMode && costInfo) desc = '••••••';

                const width = avail ? Math.max(pct, 5) : 100;

                return '<div class="provider-item' + (avail ? '' : ' unavailable') + '">' +
                    '<div class="provider-header"><span class="provider-name">' + escapeHtml(p.provider_name) + '</span>' +
                    '<span class="provider-type">' + escapeHtml(costInfo) + '</span></div>' +
                    '<div class="provider-bar-container"><div class="provider-bar ' + cls + '" style="width:' + width + '%">' + escapeHtml(avail ? pct.toFixed(0) + '%' : 'Unavailable') + '</div></div>' +
                    '<div class="provider-info"><span>' + escapeHtml(desc) + '</span><span>' + escapeHtml(p.last_updated || '') + '</span></div></div>';
            }).join('');
        }

        function togglePrivacy() {
            privacyMode = !privacyMode;
            document.getElementById('privacyBtn').classList.toggle('active', privacyMode);
            renderProviders();
        }

        function toggleAlwaysOnTop() {
            const enabled = document.getElementById('alwaysOnTopToggle').checked;
            if (window.__TAURI__ && window.__TAURI__.invoke) {
                window.__TAURI__.invoke('toggle_always_on_top', { enabled });
            }
        }

        function openSettings() {
            console.log('Opening settings...');
            console.log('__TAURI__:', window.__TAURI__);
            console.log('invoke:', window.__TAURI__?.invoke);
            console.log('core:', window.__TAURI__?.core);
            
            if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
                console.log('Using core.invoke...');
                window.__TAURI__.core.invoke('open_settings_window')
                    .then(() => console.log('Settings opened'))
                    .catch(e => console.error('Failed to open settings:', e));
            } else if (window.__TAURI__ && window.__TAURI__.invoke) {
                console.log('Using invoke...');
                window.__TAURI__.invoke('open_settings_window')
                    .then(() => console.log('Settings opened'))
                    .catch(e => console.error('Failed to open settings:', e));
            } else {
                console.error('Tauri not available');
                alert('Settings cannot be opened. Tauri API not available.');
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

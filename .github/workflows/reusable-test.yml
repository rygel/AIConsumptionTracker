name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      test-filter:
        description: 'Test filter expression (e.g., FullyQualifiedName~ProviderTests)'
        required: true
        type: string
      test-suite-name:
        description: 'Name for the test suite (used in artifact names)'
        required: true
        type: string
      timeout-minutes:
        description: 'Timeout in minutes for the test job'
        required: false
        type: number
        default: 10
      hang-timeout-seconds:
        description: 'Hang detection timeout in seconds'
        required: false
        type: number
        default: 300
      max-retries:
        description: 'Maximum number of test retries'
        required: false
        type: number
        default: 0
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '8.0.x'
      runs-on:
        description: 'Runner OS'
        required: false
        type: string
        default: 'windows-latest'
    secrets:
      GITHUB_TOKEN:
        required: true

jobs:
  test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
    - name: Download built test binaries
      uses: actions/download-artifact@v4
      with:
        name: test-binaries-debug
        path: .\_ci_test_binaries

    - name: Run Tests
      timeout-minutes: ${{ inputs.timeout-minutes }}
      shell: pwsh
      run: >
        powershell -NoProfile -ExecutionPolicy Bypass -File .\_ci_test_binaries\scripts\run-vstest-with-retry.ps1
        -AssemblyPath .\_ci_test_binaries\AIUsageTracker.Tests\bin\Debug\net8.0-windows10.0.17763.0\AIUsageTracker.Tests.dll
        -SuiteName ${{ inputs.test-suite-name }}
        -QuarantineFile .\_ci_test_binaries\.github\test-quarantine.txt
        -MaxRetries ${{ inputs.max-retries }}
        -AttemptTimeoutMinutes ${{ inputs.timeout-minutes }}
        -HangTimeoutSeconds ${{ inputs.hang-timeout-seconds }}

    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.test-suite-name }}-results
        path: TestResults/${{ inputs.test-suite-name }}*.trx
        retention-days: 3
